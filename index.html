<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Filarmónica</title>

<link rel="manifest" href="manifest.json">

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;}
header{background:#2b6cb0;color:white;padding:10px;display:flex;align-items:center;justify-content:space-between;}
#clef{width:28px;height:28px;}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;padding:10px;}
.day{background:white;padding:8px;min-height:70px;border-radius:8px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.event{font-size:10px;background:#2b6cb0;color:white;margin-top:2px;border-radius:4px;padding:2px;}
button{padding:6px 10px;margin:2px;}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;}
.box{background:white;padding:15px;width:90%;max-width:400px;border-radius:10px;}
input,select,textarea{width:100%;margin:5px 0;padding:6px;}
</style>
</head>

<body>

<header>
<div style="display:flex;align-items:center;gap:8px;">
<svg id="clef" viewBox="0 0 64 64"><path fill="white" d="M34 2c-6 2-10 8-10 14 0 5 3 9 7 11-7 3-12 9-12 17 0 9 7 16 16 16s16-7 16-16c0-7-4-13-10-16V10c0-5-3-8-7-8z"/></svg>
<b>Agenda Filarmónica</b>
</div>
<button onclick="openModal()">+</button>
</header>

<div class="calendar" id="cal"></div>

<div class="modal" id="modal">
<div class="box">
<h3>Novo Evento</h3>

<select id="band">
<option>Sociedade Artística Banda de Vale de Cambra</option>
<option>Banda Musical de Figueiredo</option>
<option>Outros</option>
</select>

<input id="other" placeholder="Outra banda">
<select id="type">
<option>Serviço</option>
<option>Ensaio</option>
</select>

<input type="date" id="date">
<input type="time" id="start">
<input type="time" id="end">
<input id="location" placeholder="Local">
<input type="number" id="value" value="60">

<textarea id="notes" placeholder="Notas"></textarea>

<button onclick="save()">Guardar</button>
<button onclick="closeModal()">Fechar</button>
</div>
</div>

<script>
let events=JSON.parse(localStorage.getItem("ev")||"[]");

function render(){
let cal=document.getElementById("cal");
cal.innerHTML="";

let d=new Date();
let year=d.getFullYear();
let month=d.getMonth();

let first=new Date(year,month,1);
let last=new Date(year,month+1,0);

for(let i=1;i<=last.getDate();i++){
let div=document.createElement("div");
div.className="day";
div.innerHTML="<b>"+i+"</b>";

events.filter(e=>e.date.endsWith("-"+String(i).padStart(2,"0"))).forEach(e=>{
let ev=document.createElement("div");
ev.className="event";
ev.innerText=e.band;
div.appendChild(ev);
});

cal.appendChild(div);
}
}

function openModal(){document.getElementById("modal").style.display="flex";}
function closeModal(){document.getElementById("modal").style.display="none";}

function save(){
let band=document.getElementById("band").value;
if(band==="Outros") band=document.getElementById("other").value;

events.push({
band,
type:document.getElementById("type").value,
date:document.getElementById("date").value,
start:document.getElementById("start").value,
end:document.getElementById("end").value,
location:document.getElementById("location").value,
value:document.getElementById("value").value,
notes:document.getElementById("notes").value
});

localStorage.setItem("ev",JSON.stringify(events));
closeModal();
render();
}

render();
</script>

<script>
if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
