<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Filarmónica</title>

<style>
:root{
  --bg:#f4f4f4;
  --card:#fff;
  --text:#222;
  --primary:#2b6cb0;
  --shadow:0 2px 8px rgba(0,0,0,0.1);
}

body.dark{
  --bg:#1a202c;
  --card:#2d3748;
  --text:#f7fafc;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:var(--card);
  box-shadow:var(--shadow);
}

header h1{
  font-size:16px;
  display:flex;
  gap:8px;
  align-items:center;
}

/* CALENDAR */
#calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
  padding:10px;
}

.day{
  background:var(--card);
  min-height:70px;
  padding:5px;
  border-radius:8px;
  box-shadow:var(--shadow);
  font-size:12px;
  cursor:pointer;
}

.event{
  background:#2b6cb0;
  color:white;
  font-size:10px;
  padding:2px;
  margin-top:2px;
  border-radius:4px;
}

/* SECTIONS */
.section{
  padding:10px;
}

.card{
  background:var(--card);
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  box-shadow:var(--shadow);
  font-size:13px;
}

/* MODAL */
#modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-box{
  background:var(--card);
  padding:15px;
  width:90%;
  max-width:400px;
  border-radius:10px;
}

input,select,textarea{
  width:100%;
  margin:5px 0;
  padding:7px;
}

button{
  padding:8px;
  margin:5px 0;
  width:100%;
  border:none;
  border-radius:6px;
  background:var(--primary);
  color:white;
}
</style>
</head>

<body>

<header>
<h1>🎼 Agenda Filarmónica</h1>
<button onclick="toggleTheme()">🌓</button>
</header>

<div id="calendar"></div>

<div class="section">
<h3>Próximos eventos</h3>
<div id="next"></div>
</div>

<div class="section">
<h3>Estatísticas</h3>
<div id="stats"></div>
</div>

<!-- MODAL -->
<div id="modal">
<div class="modal-box">

<h3>Novo Evento</h3>

<select id="band">
  <option disabled selected>Seleciona a banda</option>
  <option>Sociedade Artística Banda de Vale de Cambra</option>
  <option>Banda Musical de Figueiredo</option>
  <option>Outros</option>
</select>

<input id="other" placeholder="Outra banda (se necessário)">

<select id="type">
  <option>Serviço</option>
  <option>Ensaio</option>
</select>

<input type="date" id="date">
<input type="time" id="start">
<input type="time" id="end">

<input id="location" placeholder="Localização">
<input id="second" placeholder="Segunda banda (opcional)">

<!-- VALOR 5 EM 5 -->
<select id="value">
  <option>0</option>
  <option>20</option>
  <option>40</option>
  <option selected>60</option>
  <option>80</option>
  <option>100</option>
  <option>120</option>
  <option>140</option>
  <option>160</option>
  <option>180</option>
  <option>200</option>
</select>

<textarea id="notes" placeholder="Notas"></textarea>

<button onclick="save()">Guardar</button>
<button onclick="closeModal()" style="background:#718096">Fechar</button>

</div>
</div>

<script>

/* =========================
   DADOS (mais estável)
========================= */
let data = JSON.parse(localStorage.getItem("agenda_filarmonica") || "{}");
let events = data.events || [];

/* =========================
   CALENDÁRIO
========================= */
let today = new Date();

function render(){
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  let year = today.getFullYear();
  let month = today.getMonth();

  let first = new Date(year,month,1);
  let last = new Date(year,month+1,0);

  for(let i=1;i<=last.getDate();i++){
    let dateStr = `${year}-${String(month+1).padStart(2,"0")}-${String(i).padStart(2,"0")}`;

    let div = document.createElement("div");
    div.className="day";
    div.innerHTML="<b>"+i+"</b>";

    events.filter(e=>e.date===dateStr).forEach(e=>{
      let ev=document.createElement("div");
      ev.className="event";
      ev.innerText=e.band;
      div.appendChild(ev);
    });

    div.onclick=()=>openModal(dateStr);
    cal.appendChild(div);
  }

  renderNext();
  renderStats();
}

/* =========================
   MODAL
========================= */
function openModal(date){
  document.getElementById("modal").style.display="flex";
  document.getElementById("date").value=date;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* =========================
   GUARDAR
========================= */
function save(){

  let band = document.getElementById("band").value;
  if(band==="Outros") band=document.getElementById("other").value;

  let ev = {
    band,
    type:document.getElementById("type").value,
    date:document.getElementById("date").value,
    start:document.getElementById("start").value,
    end:document.getElementById("end").value,
    location:document.getElementById("location").value,
    second:document.getElementById("second").value,
    value:Number(document.getElementById("value").value),
    notes:document.getElementById("notes").value
  };

  events.push(ev);

  localStorage.setItem("agenda_filarmonica", JSON.stringify({
    events: events,
    savedAt: new Date().toISOString()
  }));

  closeModal();
  render();
}

/* =========================
   PRÓXIMOS EVENTOS
========================= */
function renderNext(){
  let div = document.getElementById("next");
  div.innerHTML="";

  let sorted = [...events].sort((a,b)=>a.date.localeCompare(b.date)).slice(0,5);

  sorted.forEach(e=>{
    let d=document.createElement("div");
    d.className="card";
    d.innerHTML=`${e.date} - ${e.band} (${e.type}) - €${e.value}`;
    div.appendChild(d);
  });
}

/* =========================
   ESTATÍSTICAS
========================= */
function renderStats(){
  let total = events.length;
  let serv = events.filter(e=>e.type==="Serviço").length;
  let ens = events.filter(e=>e.type==="Ensaio").length;
  let money = events.reduce((a,b)=>a + (b.value||0),0);

  document.getElementById("stats").innerHTML=`
    Eventos: ${total}<br>
    Serviços: ${serv}<br>
    Ensaios: ${ens}<br>
    Total: €${money}
  `;
}

/* =========================
   TEMA
========================= */
function toggleTheme(){
  document.body.classList.toggle("dark");
}

render();
</script>

</body>
</html>
