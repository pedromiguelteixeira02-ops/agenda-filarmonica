<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Filarmónica</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f4f4;
  color:#222;
}

header{
  padding:10px;
  background:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.controls{
  display:flex;
  justify-content:center;
  gap:8px;
  padding:10px;
}

select,button{
  padding:6px;
  border-radius:6px;
}

#calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:4px;
  padding:10px;
}

.day{
  background:white;
  min-height:60px;
  padding:5px;
  font-size:12px;
  border-radius:6px;
  cursor:pointer;
}

.empty{
  background:transparent;
}

.event{
  font-size:10px;
  background:#2b6cb0;
  color:white;
  padding:2px;
  margin-top:2px;
  border-radius:4px;
}

#modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  align-items:center;
  justify-content:center;
}

.box{
  background:white;
  padding:15px;
  width:90%;
  max-width:400px;
  border-radius:10px;
}

input,select{
  width:100%;
  margin:5px 0;
  padding:6px;
}
</style>
</head>

<body>

<header>
<h3>🎼 Agenda Filarmónica</h3>
</header>

<div class="controls">
<button onclick="prevMonth()">◀</button>

<select id="month"></select>
<select id="year"></select>

<button onclick="nextMonth()">▶</button>
</div>

<div id="calendar"></div>

<!-- MODAL -->
<div id="modal">
<div class="box">

<h3>Novo Evento</h3>

<select id="band">
<option>Sociedade Artística Banda de Vale de Cambra</option>
<option>Banda Musical de Figueiredo</option>
<option>Outros</option>
</select>

<input id="other" placeholder="Outra banda">

<input type="date" id="date">
<input type="time" id="start">
<input type="time" id="end">

<input id="location" placeholder="Local">

<button onclick="save()">Guardar</button>
<button onclick="closeModal()">Fechar</button>

</div>
</div>

<script>

/* =========================
   DADOS
========================= */
let events = JSON.parse(localStorage.getItem("agenda") || "[]");

/* =========================
   DATA
========================= */
let now = new Date();
let m = now.getMonth();
let y = now.getFullYear();

/* =========================
   SELECTS
========================= */
const monthSel = document.getElementById("month");
const yearSel = document.getElementById("year");

const meses=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

meses.forEach((x,i)=>{
monthSel.innerHTML += `<option value="${i}">${x}</option>`;
});

for(let i=2024;i<=2035;i++){
yearSel.innerHTML += `<option value="${i}">${i}</option>`;
}

monthSel.value = m;
yearSel.value = y;

/* =========================
   RENDER
========================= */
function render(){

m = parseInt(monthSel.value);
y = parseInt(yearSel.value);

let cal = document.getElementById("calendar");
cal.innerHTML = "";

let first = new Date(y,m,1);
let start = first.getDay();
let days = new Date(y,m+1,0).getDate();

for(let i=0;i<start;i++){
cal.innerHTML += "<div class='empty'></div>";
}

for(let d=1; d<=days; d++){

let date = `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

let div = document.createElement("div");
div.className = "day";
div.innerHTML = "<b>"+d+"</b>";

events.filter(e=>e.date===date).forEach(e=>{
let ev = document.createElement("div");
ev.className = "event";
ev.innerText = e.band;
div.appendChild(ev);
});

div.onclick = ()=>openModal(date);

cal.appendChild(div);
}

}

/* =========================
   MODAL
========================= */
function openModal(date){
document.getElementById("modal").style.display="flex";
document.getElementById("date").value=date;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

/* =========================
   SAVE
========================= */
function save(){

let band=document.getElementById("band").value;
if(band==="Outros") band=document.getElementById("other").value;

events.push({
band,
date:document.getElementById("date").value
});

localStorage.setItem("agenda",JSON.stringify(events));

closeModal();
render();
}

/* =========================
   NAV
========================= */
function prevMonth(){
m--;
if(m<0){m=11;y--;}
monthSel.value=m;
yearSel.value=y;
render();
}

function nextMonth(){
m++;
if(m>11){m=0;y++;}
monthSel.value=m;
yearSel.value=y;
render();
}

/* =========================
   INIT (IMPORTANTE)
========================= */
render();

</script>

</body>
</html>
